site_name: 《计算机科学中的随机过程》习题书
theme:
  name: material
  language: zh
  features:
    - navigation.tabs # 开启顶部导航栏
    - navigation.indexes # 允许点击文件夹名称进入对应汇总页

nav:
  - 首页: index.md
  - 习题与解答:
      - 第一章: exercises/chapter_01.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets:          # 注意这里加了冒号
      base_path: docs           # 这一行告诉插件：所有小剪刀路径都从 docs 文件夹开始算！

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
